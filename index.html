<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ScheduleSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--s1:#141720;--s2:#1c2030;--s3:#232840;--b:rgba(255,255,255,0.07);--bh:rgba(255,255,255,0.14);--t:#f0f2f8;--tm:#6b7498;--td:#3d4460;--ac:#5b6ef5;--al:#7b8fff;--ad:rgba(91,110,245,0.15);--gr:#3ecf8e;--gd:rgba(62,207,142,0.12);--am:#f5a623;--amd:rgba(245,166,35,0.12);--re:#f56060;--rd:rgba(245,96,96,0.12);--pu:#a78bfa;--pd:rgba(167,139,250,0.12);--r:10px;--rl:14px;--rxl:18px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px;line-height:1.6}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--b)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--tm);margin-top:1px}
.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--td);text-transform:uppercase;padding:0 8px;margin:12px 0 6px}
